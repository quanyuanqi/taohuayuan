<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>桃花源历史文化</title>
    <style>
        @page {
            size: A4;
            margin: 0;
            background-color: #fdfaf5;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #fdfaf5;
            color: #333;
            min-height: 297mm;
            position: relative;
        }
        .header {
            position: absolute;
            top: 20mm;
            left: 20mm;
        }
        .header a {
            text-decoration: none;
            font-size: 14pt;
            color: #8b4513;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.3s;
        }
        .header a:hover {
            border-bottom: 1px solid #8b4513;
        }
        .main-container {
            width: 100%;
            height: 297mm;
            display: table;
        }
        .content-cell {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }
        .project-image {
            max-width: 80%;
            max-height: 70%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .footer {
            position: absolute;
            bottom: 15mm;
            width: 100%;
            text-align: center;
            font-size: 9pt;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="https://taohuayuan.org.cn/">桃花源</a>
    </div>

    <div class="main-container">
        <div class="content-cell">
            <img src="https://raw.githubusercontent.com/quanyuanqi/taohuayuan/main/images/taohuayuan2.png" alt="桃花源景观" class="project-image">
        </div>
    </div>

    <div class="footer">
    </div>
</body>
</html>
